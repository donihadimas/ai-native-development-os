openapi: 3.1.0
info:
  title: "{{title}} API"
  version: "0.1.0"
  description: "API contract for {{title}}."
servers:
  - url: "http://localhost:3000"
    description: "Local development"
paths:
  /example:
    get:
      summary: "Example endpoint"
      operationId: "getExample"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
