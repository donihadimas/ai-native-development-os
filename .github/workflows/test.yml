name: Manual Test

on:
  workflow_dispatch:

jobs:
  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Build and test
        working-directory: cli
        run: npm test

      - name: Run smoke commands
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          node cli/dist/src/index.js starter fullstack-saas "$TMP_DIR/demo-saas"
          node cli/dist/src/index.js validate "$TMP_DIR/demo-saas"
          cd "$TMP_DIR/demo-saas"
          node "$GITHUB_WORKSPACE/cli/dist/src/index.js" openapi "Habit API"
          node "$GITHUB_WORKSPACE/cli/dist/src/index.js" migration "Create habits table"
          node "$GITHUB_WORKSPACE/cli/dist/src/index.js" security "Habit API"
          node "$GITHUB_WORKSPACE/cli/dist/src/index.js" release "0.3.0"
